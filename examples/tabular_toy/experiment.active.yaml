# experiment.active.yaml
#
# Active (initial) config for round 01 of the illustrative tabular PyTorch HPO
# example. Conforms to ../../schemas/next_round_config.schema.json with
# provenance.kind = "initial" (no parent bundle).
#
# On-disk canonical form for hashing is JSON produced by
#   json.dumps(cfg, sort_keys=True, separators=(",", ":"))
# — adapters should convert this YAML to JSON before computing config hashes.

schema_version: "1.0"
round_id: "round_01"
n_trials: 20

sampler:
  type: "TPESampler"
  params:
    n_startup_trials: 5
    multivariate: true
    group: true
  seed: 42

pruner:
  type: "MedianPruner"
  params:
    n_startup_trials: 5
    n_warmup_steps: 5

search_space:
  hidden_units:
    type: "categorical"
    choices: [64, 128, 256, 512]
  num_layers:
    type: "int"
    low: 1
    high: 4
  dropout:
    type: "float"
    low: 0.0
    high: 0.5
  learning_rate:
    type: "float"
    low: 1.0e-4
    high: 1.0e-2
    log: true
  batch_size:
    type: "categorical"
    choices: [16, 32, 64, 128]
  optimizer:
    type: "categorical"
    choices: ["adam", "adamw"]
  activation:
    type: "categorical"
    choices: ["relu", "gelu"]

# fixed_params are held constant for every trial this round.
# max_epochs / weight_decay are consumed by train_eval.py outside the
# Optuna search; keeping them fixed avoids per-trial variance from
# training budget.
fixed_params:
  max_epochs: 20
  weight_decay: 0.0001

stop_conditions:
  max_rounds: 3
  max_total_trials: 80
  target_value: null
  no_improvement_rounds: 2
  min_delta: 0.002

provenance:
  kind: "initial"
  source_round_id: null
  source_bundle_hash: null
  parent_config_hash: null
  generated_at: "2026-04-23T12:00:00Z"
  generated_by:
    tool: "human"
    model: null
    prompt_version: null
    prompt_path: null
  reviewer:
    kind: "human"
    id: null
    approved_at: "2026-04-23T12:00:00Z"
    comments: "Initial wide sweep for the illustrative PyTorch tabular HPO example."
  rationale: |
    Round 01 is the initial exploratory sweep for this toy example. The
    search space is intentionally wide across 7 knobs (hidden_units,
    num_layers, dropout, learning_rate, batch_size, optimizer, activation)
    so that the outer-loop analyst in round 02 has structural signal to
    narrow, shift, or freeze. max_epochs and weight_decay are fixed so
    they do not contribute to per-trial variance.

notes: |
  Illustrative example only. Primary metric is val_auc on a stratified
  80/20 split of sklearn's load_breast_cancer dataset. Trials are small
  MLPs trained on CPU; 20 trials should complete in a few minutes on a
  modern laptop.
