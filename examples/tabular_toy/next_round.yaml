# next_round.yaml
#
# Proposed round_02 config derived from study_bundle.json. Conforms to
# ../../schemas/next_round_config.schema.json with provenance.kind =
# "llm_proposed". Two params (optimizer, activation) are frozen, which is
# a "large change" per ../../docs/anti_patterns.md#a7 — reviewer.kind is
# therefore "human" and reviewer.approved_at is left null so the adapter
# will block execution until a human signs off.
#
# Hashes in provenance are placeholders; the adapter fills them at write
# time from the canonicalised JSON form of both files.

schema_version: "1.0"
round_id: "round_02"
n_trials: 25

sampler:
  type: "TPESampler"
  params:
    n_startup_trials: 5
    multivariate: true
    group: true
  seed: 42

pruner:
  type: "MedianPruner"
  params:
    n_startup_trials: 5
    n_warmup_steps: 5

search_space:
  hidden_units:
    type: "categorical"
    choices: [128, 256, 512]
  num_layers:
    type: "int"
    low: 2
    high: 3
  dropout:
    type: "float"
    low: 0.0
    high: 0.25
  learning_rate:
    type: "float"
    low: 5.0e-4
    high: 5.0e-3
    log: true
  batch_size:
    type: "categorical"
    choices: [16, 32, 64, 128]

fixed_params:
  max_epochs: 20
  weight_decay: 0.0001
  optimizer: "adamw"
  activation: "gelu"

stop_conditions:
  max_rounds: 3
  max_total_trials: 80
  target_value: null
  no_improvement_rounds: 2
  min_delta: 0.002

provenance:
  kind: "llm_proposed"
  source_round_id: "round_01"
  source_bundle_hash: "__FILL_AT_ADAPTER__"
  parent_config_hash: "__FILL_AT_ADAPTER__"
  generated_at: "2026-04-23T13:05:00Z"
  generated_by:
    tool: "claude_code"
    model: "claude-opus-4-7"
    prompt_version: "0.1.0"
    prompt_path: "prompts/claude_code/propose_next_round.md"
  reviewer:
    kind: "human"
    id: null
    approved_at: null
    comments: null
  rationale: |
    Round 01 importances concentrate on learning_rate (0.32) and optimizer
    (0.22); the top 4 trials (7, 12, 15, 18) all share optimizer=adamw and
    activation=gelu with hidden_units in {128, 256, 512} and
    learning_rate in [1.2e-3, 2.0e-3]. Both optimizer and activation are
    frozen. Remaining params are narrowed to the convex hull of top trials
    with modest buffers: hidden_units drops 64 (never in top-5);
    num_layers [1,4] → [2,3] (top cluster); dropout [0, 0.5] → [0, 0.25]
    (top span 0.05–0.20); learning_rate [1e-4, 1e-2] → [5e-4, 5e-3] (top
    span 1.2e-3–2.5e-3, with both current boundary hits occurring only in
    PRUNED/FAIL trials). batch_size is kept because its importance is low
    (0.02) but the top trials use 3 of the 4 existing choices — no clear
    dominant value yet. Sampler (TPE) and pruner (Median) unchanged; the
    5-axis mixed space is still well-suited to TPE. n_trials raised
    20 → 25 to get slightly finer coverage of the narrowed space.
  diff_summary:
    - action: "freeze"
      target: "optimizer"
      before: { type: "categorical", choices: ["adam", "adamw"] }
      after:  "adamw"
      evidence: "param_importances.optimizer=0.22; clusters[0].center.optimizer=adamw covers all top-4 trials (7, 12, 15, 18)"
    - action: "freeze"
      target: "activation"
      before: { type: "categorical", choices: ["relu", "gelu"] }
      after:  "gelu"
      evidence: "clusters[0].center.activation=gelu; top_trials 7, 12, 15, 18 all use gelu; param_importances.activation=0.09 is low enough to freeze cheaply"
    - action: "narrow"
      target: "learning_rate"
      before: { type: "float", low: 1.0e-4, high: 1.0e-2, log: true }
      after:  { type: "float", low: 5.0e-4, high: 5.0e-3, log: true }
      evidence: "top_trials span learning_rate in [1.2e-3, 2.5e-3]; statistics.axis_coverage.learning_rate.sampled_min=6e-4, sampled_max=3e-3 (completes stayed inside the new band); boundary_hits.learning_rate.low=1 and .high=1 are both PRUNED/FAIL (attempted-but-weak at both configured edges)"
    - action: "narrow"
      target: "hidden_units"
      before: { type: "categorical", choices: [64, 128, 256, 512] }
      after:  { type: "categorical", choices: [128, 256, 512] }
      evidence: "hidden_units=64 absent from top-5 trials; param_importances.hidden_units=0.16 so retained as categorical rather than frozen"
    - action: "narrow"
      target: "num_layers"
      before: { type: "int", low: 1, high: 4 }
      after:  { type: "int", low: 2, high: 3 }
      evidence: "top-4 cluster uses num_layers in {2, 3}; statistics.axis_coverage.num_layers.sampled_min=1, sampled_max=3; boundary_hits.num_layers.high=3 are all PRUNED/FAIL (attempted-but-weak at num_layers=4, the upper edge); boundary_hits.num_layers.low=3 are mostly low-AUC COMPLETE (sampled-but-poor at num_layers=1, the lower edge)"
    - action: "narrow"
      target: "dropout"
      before: { type: "float", low: 0.0, high: 0.5 }
      after:  { type: "float", low: 0.0, high: 0.25 }
      evidence: "top-5 trials span dropout in [0.05, 0.20]; statistics.axis_coverage.dropout.sampled_min=0.05, sampled_max=0.35; boundary_hits.dropout.high=2 only in PRUNED/FAIL (attempted-but-weak at upper edge); lower edge is UNSAMPLED with boundary_hits.dropout.low=0, so the new lower bound stays at 0.0 — no narrow against the never-tried edge (see docs/anti_patterns.md#a10)"

notes: |
  Freezing optimizer and activation is a "large change" per
  anti_patterns.md A7 — reviewer.kind=human required. approved_at left
  null so the adapter will block round_02 execution until a human signs
  off.
